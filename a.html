"cw"><canvas id="cv"></canvas><div class="left-ctrl"><div class="lbtn">⋯</div><div class="lbtn">💼<span class="bdg b">0</span></div></div><div class="time-ind"><span class="dot-g"></span><span id="tm">15:47:38<br>UTC+3</span><span class="info-i">i</span></div></div><div class="bot"><div class="row1"><div class="assetw"><span class="flags"><span class="flag">🇺🇸</span><span class="flag">🇨🇦</span></span><span class="asset">USD/CAD</span><span class="yld">83%</span><span class="chev">⌄</span></div><div class="ptrade"><span>PENDING TRADE</span><div class="tgl"></div></div></div><div class="inps"><div class="inp"><span class="lbl">Timer</span><span class="tmv">00:01</span></div><div class="inp"><span class="lbl">Investment</span><div class="inpr"><button class="ibtn" onclick="ch(-1)">−</button><span class="ival" id="iv">1 $</span><button class="ibtn" onclick="ch(1)">+</button></div><div class="cnv">SWITCH</div></div></div><div class="prf"><span class="prf-l">Payout</span><span class="line"></span><span class="prf-v" id="pv">1.83 $</span></div><div class="btns"><button class="tbtn up"><span>Up</span><span class="arw">↑</span></button><button class="tbtn dn"><span>Down</span><span class="arw">↓</span></button></div></div></div><script>let inv=1,iv=document.getElementById('iv'),pv=document.getElementById('pv');function ch(d){inv=Math.max(1,inv+d);iv.textContent=inv+' $';pv.textContent=(inv*1.83).toFixed(2)+' $'}function uc(){let n=new Date(Date.now()+(new Date().getTimezoneOffset()+180)*6e4),p=x=>String(x).padStart(2,'0');document.getElementById('tm').innerHTML=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds())+'<br>UTC+3'}setInterval(uc,1e3);uc();let cv=document.getElementById('cv'),cx=cv.getContext('2d'),cw=document.getElementById('cw'),W,H,candles=[],price=1.42304,lastT=0,zoom=1,priceRange=.0008,centerP=1.4234,VIS=9;function rs(){let r=cw.getBoundingClientRect();cv.width=W=r.width*devicePixelRatio;cv.height=H=r.height*devicePixelRatio;cv.style.width=r.width+'px';cv.style.height=r.height+'px'}function init(){candles=[];let p=1.4236;for(let i=0;i<200;i++){let o=p,c=p+(Math.random()-.5)*.0004,hi=Math.max(o,c)+Math.random()*.00015,lo=Math.min(o,c)-Math.random()*.00015;candles.push({o:o,c:c,h:hi,l:lo});p=c}price=candles[candles.length-1].c;centerP=price}function draw(){cx.fillStyle='#0e1521';cx.fillRect(0,0,W,H);let w=W/devicePixelRatio,h=H/devicePixelRatio,dpr=devicePixelRatio,visN=Math.round(VIS*zoom),pr=priceRange*zoom,mn=centerP-pr/2,mx=centerP+pr/2,y=v=>(mx-v)/(mx-mn)*h,sp=w/visN,GR=5,gs=pr/GR;cx.lineWidth=dpr;cx.strokeStyle='#1a2433';for(let i=0;i<=GR;i++){let yy=y(mn+gs*i)*dpr;cx.beginPath();cx.moveTo(0,yy);cx.lineTo(W,yy);cx.stroke()}for(let i=0;i<=4;i++){let xx=i*(w/4)*dpr;cx.beginPath();cx.moveTo(xx,0);cx.lineTo(xx,H);cx.stroke()}cx.font=10*dpr+'px Arial';cx.textAlign='right';cx.fillStyle='#8a96a8';for(let i=0;i<=GR;i++){let lv=mn+gs*i,yy=y(lv)*dpr;cx.fillText(lv.toFixed(5),(w-4)*dpr,yy-3*dpr)}cx.textAlign='center';let sx=w*.5,ex=w*.8;cx.setLineDash([4,4]);cx.strokeStyle='#4a5668';cx.beginPath();cx.moveTo(sx*dpr,0);cx.lineTo(sx*dpr,H);cx.stroke();cx.beginPath();cx.moveTo(ex*dpr,0);cx.lineTo(ex*dpr,H);cx.stroke();cx.setLineDash([]);cx.fillStyle='#5a6678';cx.fillText('بداية التجارة',sx*dpr,18*dpr);cx.fillText('نهاية الصفقة',ex*dpr,18*dpr);let sI=candles.length-visN;for(let i=0;i<visN;i++){let k=candles[sI+i];if(!k)continue;let cxp=(i*sp+sp/2)*dpr,upc=k.c>=k.o;cx.strokeStyle=cx.fillStyle=upc?'#12b062':'#df4a3b';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(cxp,y(k.h)*dpr);cx.lineTo(cxp,y(k.l)*dpr);cx.stroke();let bw=sp*.65*dpr,by=y(Math.max(k.o,k.c))*dpr,bh=Math.max(1,Math.abs(y(k.o)-y(k.c)))*dpr;cx.fillRect(cxp-bw/2,by,bw,bh)}let cy=y(price)*dpr;cx.setLineDash([5,5]);cx.strokeStyle='#fff';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(0,cy);cx.lineTo(W,cy);cx.stroke();cx.setLineDash([]);cx.fillStyle='#1a2433';cx.fillRect((ex-32)*dpr,cy-9*dpr,30*dpr,18*dpr);cx.fillStyle='#fff';cx.font='bold '+10*dpr+'px Arial';cx.textAlign='center';cx.fillText('00:'+String(Math.max(0,22-Math.floor((Date.now()-lastT)/1e3)%23)).padStart(2,'0'),(ex-17)*dpr,cy+3*dpr);cx.fillStyle='#1e88e5';cx.font='bold '+11*dpr+'px Arial';cx.textAlign='right';cx.fillText(price.toFixed(5),(w-4)*dpr,cy-4*dpr)}function tick(){let l=candles[candles.length-1];l.c+=(Math.random()-.5)*.00008;l.c>l.h&&(l.h=l.c);l.c<l.l&&(l.l=l.c);price=l.c;if(Date.now()-lastT>3e3){lastT=Date.now();let np=price+(Math.random()-.5)*.0001;candles.push({o:price,c:np,h:Math.max(price,np)+Math.random()*.00008,l:Math.min(price,np)-Math.random()*.00008});candles.length>500&&candles.shift()}draw();requestAnimationFrame(tick)}cw.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.3,Math.min(5,zoom*(e.deltaY>0?1.1:.9)))},{passive:!1});let pd=0,pz=1;cw.addEventListener('touchstart',e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd=Math.hypot(dx,dy);pz=zoom}});cw.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);zoom=Math.max(.3,Math.min(5,pz*(pd/d)))}},{passive:!1});window.addEventListener('resize',()=>{rs();draw()});rs();init();lastT=Date.now();tick();</script></body></html>
