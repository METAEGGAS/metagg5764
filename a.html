<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>منصة تداول</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}html,body{width:100%;height:100%;background:#0e1521;color:#fff;overflow:hidden;user-select:none}.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;background:#0e1521;max-width:590px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:6px}.bal{display:flex;align-items:center;background:#1a2433;border-radius:8px;padding:5px 8px;gap:6px;flex:1;max-width:205px}.cap{width:18px;height:18px;background:#2a3a52;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}.demo{background:#ff8a30;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}.bal-val{font-weight:700;font-size:12px;margin-right:auto;display:flex;align-items:center;gap:4px}.arr{font-size:8px;color:#8a96a8}.bell{position:relative;width:28px;height:28px;background:#1a2433;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}.bdg{position:absolute;top:-3px;right:-3px;background:#df4a3b;font-size:9px;font-weight:700;min-width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 4px}.bdg.b{background:#1e88e5}.dep{background:#12b062;color:#fff;border:none;padding:6px 12px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer}.promo{margin:0 8px;background:linear-gradient(90deg,#0f9754,#12b062);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;position:relative}.promo.hide{display:none}.pct{background:#6b3aa0;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}.ptxt{flex:1;font-size:11px;font-weight:600;text-align:right}.rk{font-size:16px}.cls{background:rgba(0,0,0,.2);border:none;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}.chart-wrap{flex:1;position:relative;overflow:hidden;margin-top:4px;touch-action:none}canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}.left-ctrl{position:absolute;top:10px;left:8px;display:flex;flex-direction:column;gap:6px;z-index:5}.lbtn{width:30px;height:30px;background:#1a2433;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;cursor:pointer}.time-ind{position:absolute;top:12px;left:50px;color:#8a96a8;font-size:10px;display:flex;align-items:center;gap:5px;z-index:5}.info-i{width:14px;height:14px;border-radius:50%;background:#1e88e5;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-style:italic}.dot-g{width:6px;height:6px;background:#12b062;border-radius:50%}.bot{background:#0e1521;padding:10px 12px 12px;direction:ltr}.row1{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px}.flags{display:flex;align-items:center}.flag{font-size:16px}.flag:nth-child(2){margin-left:-4px}.asset{font-weight:800;font-size:14px;color:#fff;margin-left:6px}.yld{color:#ff8a30;font-weight:800;font-size:13px}.chev{color:#fff;font-size:9px;margin-left:2px}.pending{margin-left:auto;color:#1e88e5;font-weight:800;font-size:12px;letter-spacing:.5px}.tgl{width:34px;height:18px;background:#1e88e5;border-radius:10px;position:relative;cursor:pointer}.tgl:after{content:'';position:absolute;top:2px;right:2px;width:14px;height:14px;background:#fff;border-radius:50%}.inps{display:flex;gap:10px;margin-bottom:10px}.inp{flex:1;background:transparent;border:1px solid #2a3a52;border-radius:8px;padding:10px 12px;position:relative;min-height:54px}.inp-lbl{position:absolute;top:-7px;left:10px;background:#0e1521;padding:0 5px;font-size:10px;color:#5a6678}.inp-row{display:flex;align-items:center;justify-content:space-between;height:24px}.ibtn{width:22px;height:22px;background:#2a3a52;border-radius:50%;color:#8a96a8;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}.ival,.tval{font-weight:700;font-size:16px;color:#fff}.tval{font-size:18px}.cnv{position:absolute;bottom:-7px;right:14px;background:#0e1521;padding:0 6px;color:#1e88e5;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px}.prf{display:flex;align-items:center;padding:6px 2px 10px;font-size:12px;gap:6px}.prf-l{color:#5a6678}.prf-dots{flex:1;border-bottom:1.5px dotted #2a3a52;margin:0 4px;height:10px}.prf-v{font-weight:700;font-size:13px;color:#fff}.btns{display:flex;gap:8px}.tbtn{flex:1;padding:14px;border:none;border-radius:10px;color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding-left:18px;padding-right:14px}.up{background:#12b062}.dn{background:#ff4d3d}.tbtn .ar{width:26px;height:26px;background:rgba(255,255,255,.22);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}</style></head><body><div class="app"><div class="top"><button class="dep">إيداع</button><div class="bell">🔔<span class="bdg">3</span></div><div class="bal"><span class="demo">تجريبي</span><span class="bal-val">$10,000.00 <span class="arr">▼</span></span><div class="cap">🎓</div></div></div><div class="promo" id="pm"><button class="cls" onclick="document.getElementById('pm').classList.add('hide')">✕</button><span class="pct">50%</span><span class="ptxt">احصل على مكافأة 50% على إيداعك!</span><span class="rk">🚀</span></div><div class="chart-wrap" id="cw"><canvas id="cv"></canvas><div class="left-ctrl"><div class="lbtn">⋯</div><div class="lbtn">💼<span class="bdg b">0</span></div></div><div class="time-ind"><span class="dot-g"></span><span id="tm">15:47:38<br>UTC+3</span><span class="info-i">i</span></div></div><div class="bot"><div class="row1"><span class="flags"><span class="flag">🇺🇸</span><span class="flag">🇨🇦</span></span><span class="asset">USD/CAD</span><span class="yld">83%</span><span class="chev">▼</span><span class="pending">PENDING TRADE</span><div class="tgl"></div></div><div class="inps"><div class="inp"><span class="inp-lbl">Timer</span><div class="inp-row"><span class="tval">00:01</span></div></div><div class="inp"><span class="inp-lbl">Investment</span><div class="inp-row"><button class="ibtn" onclick="ch(-1)">−</button><span class="ival" id="iv">1 $</span><button class="ibtn" onclick="ch(1)">+</button></div><span class="cnv">SWITCH</span></div></div><div class="prf"><span class="prf-l">Payout</span><span class="prf-dots"></span><span class="prf-v" id="pv">1.83 $</span></div><div class="btns"><button class="tbtn up">Up<span class="ar">↑</span></button><button class="tbtn dn">Down<span class="ar">↓</span></button></div></div></div><script>let inv=1,iv=document.getElementById('iv'),pv=document.getElementById('pv');function ch(d){inv=Math.max(1,inv+d);iv.textContent=inv+' $';pv.textContent=(inv*1.83).toFixed(2)+' $'}function uc(){let n=new Date(Date.now()+(new Date().getTimezoneOffset()+180)*6e4),p=x=>String(x).padStart(2,'0');document.getElementById('tm').innerHTML=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds())+'<br>UTC+3'}setInterval(uc,1e3);uc();let cv=document.getElementById('cv'),cx=cv.getContext('2d'),cw=document.getElementById('cw'),W,H,candles=[],price=1.42304,lastT=0,zoom=1,priceRange=.0008,centerP=1.4234,VIS=9;function rs(){let r=cw.getBoundingClientRect();cv.width=W=r.width*devicePixelRatio;cv.height=H=r.height*devicePixelRatio;cv.style.width=r.width+'px';cv.style.height=r.height+'px'}function init(){candles=[];let p=1.4236;for(let i=0;i<200;i++){let o=p,c=p+(Math.random()-.5)*.0004,hi=Math.max(o,c)+Math.random()*.00015,lo=Math.min(o,c)-Math.random()*.00015;candles.push({o:o,c:c,h:hi,l:lo});p=c}price=candles[candles.length-1].c;centerP=price}function draw(){cx.fillStyle='#0e1521';cx.fillRect(0,0,W,H);let w=W/devicePixelRatio,h=H/devicePixelRatio,dpr=devicePixelRatio,visN=Math.round(VIS*zoom),pr=priceRange*zoom,mn=centerP-pr/2,mx=centerP+pr/2,y=v=>(mx-v)/(mx-mn)*h,sp=w/visN,GR=5,gs=pr/GR;cx.lineWidth=dpr;cx.strokeStyle='#1a2433';for(let i=0;i<=GR;i++){let yy=y(mn+gs*i)*dpr;cx.beginPath();cx.moveTo(0,yy);cx.lineTo(W,yy);cx.stroke()}for(let i=0;i<=4;i++){let xx=i*(w/4)*dpr;cx.beginPath();cx.moveTo(xx,0);cx.lineTo(xx,H);cx.stroke()}cx.font=10*dpr+'px Arial';cx.textAlign='right';cx.fillStyle='#8a96a8';for(let i=0;i<=GR;i++){let lv=mn+gs*i,yy=y(lv)*dpr;cx.fillText(lv.toFixed(5),(w-4)*dpr,yy-3*dpr)}cx.textAlign='center';let sx=w*.5,ex=w*.8;cx.setLineDash([4,4]);cx.strokeStyle='#4a5668';cx.beginPath();cx.moveTo(sx*dpr,0);cx.lineTo(sx*dpr,H);cx.stroke();cx.beginPath();cx.moveTo(ex*dpr,0);cx.lineTo(ex*dpr,H);cx.stroke();cx.setLineDash([]);cx.fillStyle='#5a6678';cx.fillText('بداية التجارة',sx*dpr,18*dpr);cx.fillText('نهاية الصفقة',ex*dpr,18*dpr);let sI=candles.length-visN;for(let i=0;i<visN;i++){let k=candles[sI+i];if(!k)continue;let cxp=(i*sp+sp/2)*dpr,up=k.c>=k.o;cx.strokeStyle=cx.fillStyle=up?'#12b062':'#df4a3b';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(cxp,y(k.h)*dpr);cx.lineTo(cxp,y(k.l)*dpr);cx.stroke();let bw=sp*.65*dpr,by=y(Math.max(k.o,k.c))*dpr,bh=Math.max(1,Math.abs(y(k.o)-y(k.c)))*dpr;cx.fillRect(cxp-bw/2,by,bw,bh)}let cy=y(price)*dpr;cx.setLineDash([5,5]);cx.strokeStyle='#fff';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(0,cy);cx.lineTo(W,cy);cx.stroke();cx.setLineDash([]);cx.fillStyle='#1a2433';cx.fillRect((ex-32)*dpr,cy-9*dpr,30*dpr,18*dpr);cx.fillStyle='#fff';cx.font='bold '+10*dpr+'px Arial';cx.textAlign='center';cx.fillText('00:'+String(Math.max(0,22-Math.floor((Date.now()-lastT)/1e3)%23)).padStart(2,'0'),(ex-17)*dpr,cy+3*dpr);cx.fillStyle='#1e88e5';cx.font='bold '+11*dpr+'px Arial';cx.textAlign='right';cx.fillText(price.toFixed(5),(w-4)*dpr,cy-4*dpr)}function tick(){let l=candles[candles.length-1];l.c+=(Math.random()-.5)*.00008;l.c>l.h&&(l.h=l.c);l.c<l.l&&(l.l=l.c);price=l.c;if(Date.now()-lastT>3e3){lastT=Date.now();let np=price+(Math.random()-.5)*.0001;candles.push({o:price,c:np,h:Math.max(price,np)+Math.random()*.00008,l:Math.min(price,np)-Math.random()*.00008});candles.length>500&&candles.shift()}draw();requestAnimationFrame(tick)}cw.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.3,Math.min(5,zoom*(e.deltaY>0?1.1:.9)))},{passive:!1});let pd=0,pz=1;cw.addEventListener('touchstart',e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd=Math.hypot(dx,dy);pz=zoom}});cw.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);zoom=Math.max(.3,Math.min(5,pz*(pd/d)))}},{passive:!1});window.addEventListener('resize',()=>{rs();draw()});rs();init();lastT=Date.now();tick();</script></body></html>
