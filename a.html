<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>منصة تداول</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}html,body{width:100%;height:100%;background:#0e1521;color:#fff;overflow:hidden;user-select:none}.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;background:#0e1521;max-width:590px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:8px}.bal{display:flex;align-items:center;background:#1a2433;border-radius:10px;padding:6px 10px;gap:8px;flex:1;max-width:230px}.cap{width:22px;height:22px;background:#2a3a52;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}.demo{background:#ff8a30;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}.bal-val{font-weight:700;font-size:14px;margin-right:auto;display:flex;align-items:center;gap:4px}.arr{font-size:9px;color:#8a96a8}.bell{position:relative;width:34px;height:34px;background:#1a2433;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}.bdg{position:absolute;top:-3px;right:-3px;background:#df4a3b;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 4px}.bdg.b{background:#1e88e5}.dep{background:#12b062;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}.promo{margin:0 10px;background:linear-gradient(90deg,#0f9754,#12b062);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;position:relative}.promo.hide{display:none}.pct{background:#6b3aa0;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px}.ptxt{flex:1;font-size:13px;font-weight:600;text-align:right}.rk{font-size:18px}.cls{background:rgba(0,0,0,.2);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}.chart-wrap{flex:1;position:relative;overflow:hidden;margin-top:6px;touch-action:none}canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}.left-ctrl{position:absolute;top:12px;left:10px;display:flex;flex-direction:column;gap:8px;z-index:5}.lbtn{width:36px;height:36px;background:#1a2433;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;cursor:pointer}.time-ind{position:absolute;top:14px;left:58px;color:#8a96a8;font-size:11px;display:flex;align-items:center;gap:6px;z-index:5}.info-i{width:16px;height:16px;border-radius:50%;background:#1e88e5;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-style:italic}.dot-g{width:7px;height:7px;background:#12b062;border-radius:50%}.bot{background:#1a2433;padding:14px 12px 10px;border-radius:14px 14px 0 0}.row1{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:14px;font-size:13px}.asset{display:flex;align-items:center;gap:6px;font-weight:700}.flags{display:flex}.flag{font-size:14px}.yld{color:#12b062;font-weight:700;font-size:13px}.tgl{width:30px;height:18px;background:#1e88e5;border-radius:10px;position:relative;cursor:pointer}.tgl::after{content:'';position:absolute;top:2px;right:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s}.inps{display:flex;gap:8px;margin-bottom:8px}.inp{flex:1;background:#0e1521;border-radius:8px;padding:10px;position:relative}.inp-lbl{position:absolute;top:-7px;right:10px;background:#1a2433;padding:0 5px;font-size:10px;color:#8a96a8}.inp-row{display:flex;align-items:center;justify-content:space-between;height:28px}.ibtn{width:24px;height:24px;background:#2a3a52;border-radius:6px;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}.ival{font-weight:700;font-size:15px}.tval{font-weight:700;font-size:15px;text-align:center;width:100%}.cnv{color:#1e88e5;font-size:11px;text-align:center;margin-top:2px;cursor:pointer}.prf{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 8px;font-size:13px}.prf-l{color:#8a96a8}.prf-v{font-weight:700;font-size:14px}.btns{display:flex;gap:8px;margin-bottom:10px}.tbtn{flex:1;padding:13px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}.up{background:#12b062}.dn{background:#df4a3b}.tbtn .ar{width:24px;height:24px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}.cbar{display:flex;align-items:center;justify-content:space-around;padding:8px 8px;margin-bottom:6px}.cb{color:#8a96a8;font-size:15px;cursor:pointer;padding:3px 6px}.nav{display:flex;background:#1a2433;padding:8px 0;border-top:1px solid #0e1521;border-radius:0 0 14px 14px}.nv{flex:1;display:flex;justify-content:center;align-items:center;color:#5a6678;font-size:18px;position:relative;cursor:pointer;height:28px}.nv.a{color:#fff}.nv .bdg{top:-2px;right:50%;margin-right:-22px}</style></head><body><div class="app"><div class="top"><button class="dep">إيداع</button><div class="bell">🔔<span class="bdg">3</span></div><div class="bal"><span class="demo">تجريبي</span><span class="bal-val">$10,000.00 <span class="arr">▼</span></span><div class="cap">🎓</div></div></div><div class="promo" id="pm"><button class="cls" onclick="document.getElementById('pm').classList.add('hide')">✕</button><span class="pct">50%</span><span class="ptxt">احصل على مكافأة 50% على إيداعك!</span><span class="rk">🚀</span></div><div class="chart-wrap" id="cw"><canvas id="cv"></canvas><div class="left-ctrl"><div class="lbtn">⋯</div><div class="lbtn">💼<span class="bdg b">0</span></div></div><div class="time-ind"><span class="dot-g"></span><span id="tm">15:47:38<br>UTC+3</span><span class="info-i">i</span></div></div><div class="bot"><div class="row1"><span class="flags"><span class="flag">🇺🇸</span><span class="flag">🇨🇦</span></span><span class="asset">USD/CAD</span><span class="yld">75%</span><div class="tgl"></div></div><div class="inps"><div class="inp"><span class="inp-lbl">المؤقت</span><div class="inp-row"><span class="tval">00:01</span></div></div><div class="inp"><span class="inp-lbl">الاستثمار</span><div class="inp-row"><button class="ibtn" onclick="ch(-1)">−</button><span class="ival" id="iv">$ 1</span><button class="ibtn" onclick="ch(1)">+</button></div><div class="cnv">تحويل</div></div></div><div class="prf"><span class="prf-v" id="pv">$ 1.75</span><span class="prf-l">الربح</span></div><div class="btns"><button class="tbtn dn"><span class="ar">↓</span>هابط</button><button class="tbtn up"><span class="ar">↑</span>صاعد</button></div><div class="cbar"><span class="cb">📊</span><span class="cb">📈</span><span class="cb">⏱</span><span class="cb">⚙</span><span class="cb">📐</span><span class="cb">🔍</span><span class="cb">⛶</span></div><div class="nav"><div class="nv a">📊</div><div class="nv">❓</div><div class="nv">👤</div><div class="nv">🏆<span class="bdg b">3</span></div><div class="nv">💬<span class="bdg b">4</span></div></div></div></div><script>let inv=1;const iv=document.getElementById('iv'),pv=document.getElementById('pv');function ch(d){inv=Math.max(1,inv+d);iv.textContent='$ '+inv;pv.textContent='$ '+(inv*1.75).toFixed(2)}function uc(){const n=new Date(Date.now()+(new Date().getTimezoneOffset()+180)*60000),p=x=>String(x).padStart(2,'0');document.getElementById('tm').innerHTML=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds())+'<br>UTC+3'}setInterval(uc,1000);uc();const cv=document.getElementById('cv'),cx=cv.getContext('2d'),cw=document.getElementById('cw');let W,H,candles=[],price=1.42304,lastT=0,zoom=1,priceRange=.0008,centerP=1.42340;const VIS=9;function rs(){const r=cw.getBoundingClientRect();cv.width=W=r.width*devicePixelRatio;cv.height=H=r.height*devicePixelRatio;cv.style.width=r.width+'px';cv.style.height=r.height+'px'}function init(){candles=[];let p=1.42360;for(let i=0;i<200;i++){const o=p,c=p+(Math.random()-.5)*.0004,hi=Math.max(o,c)+Math.random()*.00015,lo=Math.min(o,c)-Math.random()*.00015;candles.push({o,c,h:hi,l:lo});p=c}price=candles[candles.length-1].c;centerP=price}function draw(){cx.fillStyle='#0e1521';cx.fillRect(0,0,W,H);const w=W/devicePixelRatio,h=H/devicePixelRatio,dpr=devicePixelRatio;const visN=Math.round(VIS*zoom),pr=priceRange*zoom,mn=centerP-pr/2,mx=centerP+pr/2;const y=v=>((mx-v)/(mx-mn))*h;const sp=w/visN,GR=5,gs=pr/GR;cx.lineWidth=dpr;cx.strokeStyle='#1a2433';for(let i=0;i<=GR;i++){const yy=y(mn+gs*i)*dpr;cx.beginPath();cx.moveTo(0,yy);cx.lineTo(W,yy);cx.stroke()}const GC=4;for(let i=0;i<=GC;i++){const xx=(i*(w/GC))*dpr;cx.beginPath();cx.moveTo(xx,0);cx.lineTo(xx,H);cx.stroke()}cx.font=(10*dpr)+'px Arial';cx.textAlign='right';cx.fillStyle='#8a96a8';for(let i=0;i<=GR;i++){const lv=mn+gs*i,yy=y(lv)*dpr;cx.fillText(lv.toFixed(5),(w-4)*dpr,yy-3*dpr)}cx.textAlign='center';const sx=w*.5,ex=w*.8;cx.setLineDash([4,4]);cx.strokeStyle='#4a5668';cx.beginPath();cx.moveTo(sx*dpr,0);cx.lineTo(sx*dpr,H);cx.stroke();cx.beginPath();cx.moveTo(ex*dpr,0);cx.lineTo(ex*dpr,H);cx.stroke();cx.setLineDash([]);cx.fillStyle='#5a6678';cx.fillText('بداية التجارة',sx*dpr,18*dpr);cx.fillText('نهاية الصفقة',ex*dpr,18*dpr);const sI=candles.length-visN;for(let i=0;i<visN;i++){const k=candles[sI+i];if(!k)continue;const cxp=(i*sp+sp/2)*dpr,up=k.c>=k.o;cx.strokeStyle=cx.fillStyle=up?'#12b062':'#df4a3b';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(cxp,y(k.h)*dpr);cx.lineTo(cxp,y(k.l)*dpr);cx.stroke();const bw=(sp*.65)*dpr,by=y(Math.max(k.o,k.c))*dpr,bh=Math.max(1,Math.abs(y(k.o)-y(k.c)))*dpr;cx.fillRect(cxp-bw/2,by,bw,bh)}const cy=y(price)*dpr;cx.setLineDash([5,5]);cx.strokeStyle='#fff';cx.lineWidth=dpr;cx.beginPath();cx.moveTo(0,cy);cx.lineTo(W,cy);cx.stroke();cx.setLineDash([]);cx.fillStyle='#1a2433';cx.fillRect((ex-32)*dpr,cy-9*dpr,30*dpr,18*dpr);cx.fillStyle='#fff';cx.font='bold '+(10*dpr)+'px Arial';cx.textAlign='center';cx.fillText('00:'+String(Math.max(0,22-Math.floor((Date.now()-lastT)/1000)%23)).padStart(2,'0'),(ex-17)*dpr,cy+3*dpr);cx.fillStyle='#1e88e5';cx.font='bold '+(11*dpr)+'px Arial';cx.textAlign='right';cx.fillText(price.toFixed(5),(w-4)*dpr,cy-4*dpr)}function tick(){const l=candles[candles.length-1];l.c+=(Math.random()-.5)*.00008;if(l.c>l.h)l.h=l.c;if(l.c<l.l)l.l=l.c;price=l.c;if(Date.now()-lastT>3000){lastT=Date.now();const np=price+(Math.random()-.5)*.0001;candles.push({o:price,c:np,h:Math.max(price,np)+Math.random()*.00008,l:Math.min(price,np)-Math.random()*.00008});if(candles.length>500)candles.shift()}draw();requestAnimationFrame(tick)}cw.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.3,Math.min(5,zoom*(e.deltaY>0?1.1:.9)))},{passive:false});let pd=0,pz=1;cw.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd=Math.hypot(dx,dy);pz=zoom}});cw.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);zoom=Math.max(.3,Math.min(5,pz*(pd/d)))}},{passive:false});window.addEventListener('resize',()=>{rs();draw()});rs();init();lastT=Date.now();tick();</script></body></html>
