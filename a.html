<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>منصة تداول</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}html,body{width:100%;height:100%;background:#0e1521;color:#fff;overflow:hidden;user-select:none}.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;background:#0e1521;max-width:590px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:6px}.bal{display:flex;align-items:center;background:#1a2433;border-radius:8px;padding:5px 8px;gap:6px;flex:1;max-width:205px}.cap{width:18px;height:18px;background:#2a3a52;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}.demo{background:#ff8a30;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}.bal-val{font-weight:700;font-size:12px;margin-right:auto;display:flex;align-items:center;gap:4px}.arr{font-size:8px;color:#8a96a8}.bell{position:relative;width:28px;height:28px;background:#1a2433;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}.bdg{position:absolute;top:-3px;right:-3px;background:#df4a3b;font-size:9px;font-weight:700;min-width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 4px}.bdg.b{background:#1e88e5}.dep{background:#12b062;color:#fff;border:none;padding:6px 12px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer}.promo{margin:0 8px;background:linear-gradient(90deg,#0f9754,#12b062);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;position:relative}.promo.hide{display:none}.pct{background:#6b3aa0;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}.ptxt{flex:1;font-size:11px;font-weight:600;text-align:right}.rk{font-size:16px}.cls{background:rgba(0,0,0,.2);border:none;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}.chart-wrap{flex:1;position:relative;overflow:hidden;margin-top:4px;touch-action:none}canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}.left-ctrl{position:absolute;top:10px;left:8px;display:flex;flex-direction:column;gap:6px;z-index:5}.lbtn{width:30px;height:30px;background:#1a2433;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;cursor:pointer}.time-ind{position:absolute;top:12px;left:50px;color:#8a96a8;font-size:10px;display:flex;align-items:center;gap:5px;z-index:5}.info-i{width:14px;height:14px;border-radius:50%;background:#1e88e5;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-style:italic}.dot-g{width:6px;height:6px;background:#12b062;border-radius:50%}.bot{background:#202636;margin:0 8px 6px;border-radius:16px 16px 12px 12px;padding:12px 10px calc(8px + env(safe-area-inset-bottom));overflow:hidden;direction:ltr;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}.row1{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}.asset{display:flex;align-items:center;gap:7px;font-weight:800;font-size:12px;letter-spacing:.1px}.flags{display:flex;gap:1px}.flag{font-size:14px;line-height:1}.yld{color:#ffab2f;font-weight:800;font-size:11px}.arr2{color:#d7dee8;font-size:14px;line-height:1;transform:translateY(-1px)}.pend{display:flex;align-items:center;gap:8px;color:#2c93ff;font-weight:800;font-size:10px;white-space:nowrap}.tgl{width:40px;height:22px;border:2px solid #2c93ff;border-radius:999px;position:relative;flex:none}.tgl:after{content:"";position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:#2c93ff}.inps{display:flex;gap:10px;margin-bottom:8px}.inp{flex:1;min-width:0;height:82px;border:2px solid #596273;border-radius:10px;background:transparent;position:relative;padding:18px 16px 12px;display:flex;align-items:center}.inp-lbl{position:absolute;top:-9px;left:13px;background:#202636;color:#8d97a6;font-size:9px;padding:0 6px;line-height:1.2}.inp-row{display:flex;align-items:center;justify-content:space-between;width:100%}.ibtn{width:36px;height:36px;border:none;border-radius:50%;background:#4c5565;color:#fff;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}.ival,.tval{font-weight:800;color:#fff}.tval{font-size:22px;letter-spacing:.5px;width:100%;text-align:left}.ival{font-size:22px;min-width:52px;text-align:center}.cnv{position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);background:#202636;color:#2c93ff;font-size:10px;font-weight:800;padding:0 8px;line-height:1.1;white-space:nowrap}.prf{display:flex;align-items:center;gap:10px;margin:4px 2px 14px}.prf-l{color:#8b94a2;font-size:12px;white-space:nowrap}.prf:after{content:"";flex:1;border-bottom:2px dotted rgba(255,255,255,.2);transform:translateY(1px)}.prf-v{font-weight:800;font-size:16px;white-space:nowrap;order:3}.btns{display:flex;gap:10px;margin-bottom:8px}.tbtn{flex:1;height:72px;border:none;border-radius:10px;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;cursor:pointer}.up{background:#12b35b}.dn{background:#ff4739}.tbtn .ar{width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}.cbar{display:flex;align-items:center;justify-content:space-around;padding:6px 6px 4px;margin-bottom:2px}.cb{color:#8a96a8;font-size:13px;cursor:pointer;padding:2px 5px}.nav{display:flex;background:#1a2433;padding:6px 0;border-top:1px solid #0e1521;border-radius:0 0 12px 12px}.nv{flex:1;display:flex;justify-content:center;align-items:center;color:#5a6678;font-size:16px;position:relative;cursor:pointer;height:24px}.nv.a{color:#fff}.nv .bdg{top:-2px;right:50%;margin-right:-20px}</style></head><body><div class="app"><div class="top"><button class="dep">إيداع</button><div class="bell">🔔<span class="bdg">3</span></div><div class="bal"><span class="demo">تجريبي</span><span class="bal-val">$10,000.00 <span class="arr">▼</span></span><div class="cap">🎓</div></div></div><div class="promo" id="pm"><button class="cls" onclick="document.getElementById('pm').classList.add('hide')">✕</button><span class="pct">50%</span><span class="ptxt">احصل على مكافأة 50% على إيداعك!</span><span class="rk">🚀</span></div><div class="chart-wrap" id="cw"><canvas id="cv"></canvas><div class="left-ctrl"><div class="lbtn">⋯</div><div class="lbtn">💼<span class="bdg b">0</span></div></div><div class="time-ind"><span class="dot-g"></span><span id="tm">15:47:38<br>UTC+3</span><span class="info-i">i</span></div></div><div class="bot"><div class="row1"><div class="asset"><span class="flags"><span class="flag">🇺🇸</span><span class="flag">🇨🇦</span></span><span>USD/CAD</span><span class="yld">83%</span><span class="arr2">⌄</span></div><div class="pend"><span>PENDING TRADE</span><div class="tgl"></div></div></div><div class="inps"><div class="inp"><span class="inp-lbl">Timer</span><div class="inp-row"><span class="tval">00:01</span></div></div><div class="inp"><span class="inp-lbl">Investment</span><div class="inp-row"><button class="ibtn" onclick="ch(-1)">−</button><span class="ival" id="iv">1 $</span><button class="ibtn" onclick="ch(1)">+</button></div><div class="cnv">SWITCH</div></div></div><div class="prf"><span class="prf-l">Payout</span><span class="prf-v" id="pv">1.83 $</span></div><div class="btns"><button class="tbtn up">Up<span class="ar">↑</span></button><button class="tbtn dn">Down<span class="ar">↓</span></button></div><div class="cbar"><span class="cb">📊</span><span class="cb">📈</span><span class="cb">⏱</span><span class="cb">⚙</span><span class="cb">📐</span><span class="cb">🔍</span><span class="cb">⛶</span></div><div class="nav"><div class="nv a">📊</div><div class="nv">❓</div><div class="nv">👤</div><div class="nv">🏆<span class="bdg b">3</span></div><div class="nv">💬<span class="bdg b">4</span></div></div></div></div><script>let inv=1,iv=document.getElementById("iv"),pv=document.getElementById("pv"),rt=.83;function ch(d){inv=Math.max(1,inv+d);iv.textContent=inv+" $";pv.textContent=(inv*(1+rt)).toFixed(2)+" $"}function uc(){let n=new Date(Date.now()+(new Date().getTimezoneOffset()+180)*6e4),p=x=>String(x).padStart(2,"0");document.getElementById("tm").innerHTML=p(n.getHours())+":"+p(n.getMinutes())+":"+p(n.getSeconds())+"<br>UTC+3"}setInterval(uc,1e3);uc();let cv=document.getElementById("cv"),cx=cv.getContext("2d"),cw=document.getElementById("cw"),W,H,candles=[],price=1.42304,lastT=0,zoom=1,priceRange=.0008,centerP=1.4234,VIS=9;function rs(){let r=cw.getBoundingClientRect();cv.width=W=r.width*devicePixelRatio;cv.height=H=r.height*devicePixelRatio;cv.style.width=r.width+"px";cv.style.height=r.height+"px"}function init(){candles=[];let p=1.4236;for(let i=0;i<200;i++){let o=p,c=p+(Math.random()-.5)*.0004,hi=Math.max(o,c)+Math.random()*.00015,lo=Math.min(o,c)-Math.random()*.00015;candles.push({o:o,c:c,h:hi,l:lo});p=c}price=candles[candles.length-1].c;centerP=price}function draw(){cx.fillStyle="#0e1521";cx.fillRect(0,0,W,H);let w=W/devicePixelRatio,h=H/devicePixelRatio,dpr=devicePixelRatio,visN=Math.round(VIS*zoom),pr=priceRange*zoom,mn=centerP-pr/2,mx=centerP+pr/2,y=v=>(mx-v)/(mx-mn)*h,sp=w/visN,GR=5,gs=pr/GR;cx.lineWidth=dpr;cx.strokeStyle="#1a2433";for(let i=0;i<=GR;i++){let yy=y(mn+gs*i)*dpr;cx.beginPath();cx.moveTo(0,yy);cx.lineTo(W,yy);cx.stroke()}for(let i=0;i<=4;i++){let xx=i*(w/4)*dpr;cx.beginPath();cx.moveTo(xx,0);cx.lineTo(xx,H);cx.stroke()}cx.font=10*dpr+"px Arial";cx.textAlign="right";cx.fillStyle="#8a96a8";for(let i=0;i<=GR;i++){let lv=mn+gs*i,yy=y(lv)*dpr;cx.fillText(lv.toFixed(5),(w-4)*dpr,yy-3*dpr)}cx.textAlign="center";let sx=w*.5,ex=w*.8;cx.setLineDash([4,4]);cx.strokeStyle="#4a5668";cx.beginPath();cx.moveTo(sx*dpr,0);cx.lineTo(sx*dpr,H);cx.stroke();cx.beginPath();cx.moveTo(ex*dpr,0);cx.lineTo(ex*dpr,H);cx.stroke();cx.setLineDash([]);cx.fillStyle="#5a6678";cx.fillText("بداية التجارة",sx*dpr,18*dpr);cx.fillText("نهاية الصفقة",ex*dpr,18*dpr);let sI=candles.length-visN;for(let i=0;i<visN;i++){let k=candles[sI+i];if(!k)continue;let cxp=(i*sp+sp/2)*dpr,up=k.c>=k.o;cx.strokeStyle=cx.fillStyle=up?"#12b062":"#df4a3b";cx.lineWidth=dpr;cx.beginPath();cx.moveTo(cxp,y(k.h)*dpr);cx.lineTo(cxp,y(k.l)*dpr);cx.stroke();let bw=sp*.65*dpr,by=y(Math.max(k.o,k.c))*dpr,bh=Math.max(1,Math.abs(y(k.o)-y(k.c)))*dpr;cx.fillRect(cxp-bw/2,by,bw,bh)}let cy=y(price)*dpr;cx.setLineDash([5,5]);cx.strokeStyle="#fff";cx.lineWidth=dpr;cx.beginPath();cx.moveTo(0,cy);cx.lineTo(W,cy);cx.stroke();cx.setLineDash([]);cx.fillStyle="#1a2433";cx.fillRect((ex-32)*dpr,cy-9*dpr,30*dpr,18*dpr);cx.fillStyle="#fff";cx.font="bold "+10*dpr+"px Arial";cx.textAlign="center";cx.fillText("00:"+String(Math.max(0,22-Math.floor((Date.now()-lastT)/1e3)%23)).padStart(2,"0"),(ex-17)*dpr,cy+3*dpr);cx.fillStyle="#1e88e5";cx.font="bold "+11*dpr+"px Arial";cx.textAlign="right";cx.fillText(price.toFixed(5),(w-4)*dpr,cy-4*dpr)}function tick(){let l=candles[candles.length-1];l.c+=(Math.random()-.5)*.00008;l.c>l.h&&(l.h=l.c);l.c<l.l&&(l.l=l.c);price=l.c;if(Date.now()-lastT>3e3){lastT=Date.now();let np=price+(Math.random()-.5)*.0001;candles.push({o:price,c:np,h:Math.max(price,np)+Math.random()*.00008,l:Math.min(price,np)-Math.random()*.00008});candles.length>500&&candles.shift()}draw();requestAnimationFrame(tick)}cw.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.max(.3,Math.min(5,zoom*(e.deltaY>0?1.1:.9)))},{passive:!1});let pd=0,pz=1;cw.addEventListener("touchstart",e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd=Math.hypot(dx,dy);pz=zoom}});cw.addEventListener("touchmove",e=>{if(e.touches.length===2){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);zoom=Math.max(.3,Math.min(5,pz*(pd/d)))}},{passive:!1});window.addEventListener("resize",()=>{rs();draw()});rs();init();lastT=Date.now();tick();</script></body></html>
