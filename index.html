<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stocks</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}body{background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;justify-content:center}.app{width:100%;max-width:637px;background:#000;padding:8px 0}.row{display:grid;grid-template-columns:60px 1fr 130px 110px;align-items:center;padding:14px 16px;gap:8px}.logo{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff}.logo img{width:100%;height:100%;object-fit:contain}.info{display:flex;flex-direction:column;gap:4px;min-width:0}.sym{color:#fff;font-size:22px;font-weight:700;letter-spacing:.3px}.name{color:#7a7d85;font-size:13px;font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chart{height:48px;width:130px}.price-block{display:flex;flex-direction:column;align-items:flex-end;gap:6px}.price{color:#fff;font-size:22px;font-weight:700;letter-spacing:.2px}.pct{font-size:14px;font-weight:600;display:flex;align-items:center;gap:3px}.up{color:#0ee47b}.down{color:#ff4d4d}.arr{font-size:10px;line-height:1}</style></head><body><div class="app" id="app"></div><script>const D=[{s:"AMD",n:"Advanced Micro Dev...",p:"537.37",c:"+4.86%",u:1,l:"https://financialmodelingprep.com/image-stock/AMD.png"},{s:"ARM",n:"Arm Holdings",p:"439.46",c:"+4.91%",u:1,l:"https://financialmodelingprep.com/image-stock/ARM.png"},{s:"AVGO",n:"Broadcom Inc.",p:"411.39",c:"+4.71%",u:1,l:"https://financialmodelingprep.com/image-stock/AVGO.png"},{s:"TXN",n:"Texas Instruments",p:"322.90",c:"+6.96%",u:1,l:"https://financialmodelingprep.com/image-stock/TXN.png"},{s:"IBM",n:"International Busine...",p:"249.10",c:"-5.05%",u:0,l:"https://financialmodelingprep.com/image-stock/IBM.png"},{s:"QCOM",n:"Qualcomm Inc.",p:"226.11",c:"+6.17%",u
